<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { width: 380px; height: 480px; overflow: hidden; }
  </style>
</head>
<body>
<div class="popup-shell">

  <div class="popup-header">
    <span class="wordmark">SNAKE</span>
    <span class="best-score" id="best-score">BEST: 0</span>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-mode="classic">CLASSIC</div>
    <div class="tab" data-mode="classic+">CLASSIC+</div>
    <div class="tab" data-mode="extreme">EXTREME</div>
    <div class="tab" data-mode="custom">CUSTOM</div>
  </div>

  <div class="canvas-wrap">
    <canvas id="game-canvas"></canvas>

    <!-- Custom mode configuration panel -->
    <div class="custom-panel" id="custom-panel">
      <div class="custom-heading">CONFIGURE</div>

      <div class="setting-row">
        <span class="setting-label">FRUIT COUNT</span>
        <div class="stepper">
          <button class="stepper-btn" id="fruit-minus">−</button>
          <span class="stepper-val" id="fruit-count">1</span>
          <button class="stepper-btn" id="fruit-plus">+</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">SPEED</span>
        <div class="speed-group" id="speed-group">
          <button class="speed-opt" data-val="220">SLOW</button>
          <button class="speed-opt active" data-val="150">MED</button>
          <button class="speed-opt" data-val="90">FAST</button>
          <button class="speed-opt" data-val="55">MAX</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">LEVELS</span>
        <button class="feat-toggle" id="toggle-levels">OFF</button>
      </div>

      <div class="setting-row">
        <span class="setting-label">OBSTACLES</span>
        <button class="feat-toggle" id="toggle-obstacles">OFF</button>
      </div>

      <div class="setting-row">
        <span class="setting-label">POWER-UPS</span>
        <button class="feat-toggle" id="toggle-powerups">OFF</button>
      </div>

      <button class="btn primary custom-play-btn" id="custom-play">▶ PLAY</button>
    </div>

    <div class="overlay" id="overlay">
      <div class="overlay-title">GAME OVER</div>
      <div class="overlay-score" id="overlay-score">SCORE: 0</div>
      <div class="overlay-best" id="overlay-best">BEST: 0</div>
      <div class="overlay-buttons">
        <button class="btn primary" id="btn-again">↩ PLAY AGAIN</button>
        <button class="btn" id="btn-menu">⌂ MENU</button>
      </div>
    </div>
  </div>

  <div class="popup-footer">
    <span class="live-score" id="live-score">SCORE: 0</span>
    <button class="expand-btn" id="expand-btn" title="Open fullscreen">⛶</button>
  </div>

</div>
<script src="game.js"></script>
<script src="popup.js"></script>
</body>
</html>
